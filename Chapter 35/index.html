      .boxes::before {
        content: "i am a before content";
        color: blueviolet;
      }
      .boxes::after {
        content: "i am after the content";
        color: aqua;
      }
      ::selection{
        background-color: coral;
      }
      .box::first-letter{
        font-size: 25px;
      }
      input::placeholder{
        color: rgb(16, 0, 120);
      }
    </style>
  </head>
  <body>
    <div class="boxes">
      <div class="box" data-color="primary">
        hey i am a div box 1 Lorem, ipsum dolor sit amet consectetur adipisicing
        elit. Voluptatum et est commodi alias modi vel ea unde libero natus.

      </div>
      <div class="box">hey i am a div box 2</div>
      <div class="box">hey i am a div box 3</div>
      <input type="text" placeholder="enter your text">
    </div>
