<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS lists</title>
    <style>
      nav ul li {
        list-style: devanagari;
        list-style: none;
        background-color: yellow;
        list-style-position: inside;
      }
      nav ul {
        display: flex;
        justify-content: space-evenly;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li>Home</li>
          <li>About us</li>
          <li>Contact</li>
          <li>Support</li>
        </ul>
      </nav>
    </header>
  </body>
</html>
