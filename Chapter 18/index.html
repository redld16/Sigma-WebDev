<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxmodel in CSS</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .box {
        background-color: aqua;
      }
      .box1 {
        color: yellow;
        padding: 10px;
        margin: 25px;
        height: 200px;
        box-sizing: border-box;
        border: 2px solid black;
      }
      .box2 {
        color: purple;
        padding: 10px;
        margin: 25px;
        height: 200px;
        box-sizing: border-box;
        border: 2px solid blue;
      }
    </style>
  </head>
  <body>
    <div class="box box1">i am a box</div>
    <div class="box box2">i am another box</div>
  </body>
</html>
