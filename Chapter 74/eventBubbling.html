<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Bubbling</title>

    <style>
      .child {
        padding: 14px;
        margin: 14px;
        border: 2px solid black;
        background-color: aliceblue;
        cursor: pointer;
      }
      .childContainer {
        padding: 14px;
        margin: 14px;
        background-color: aqua;
      }
      .container {
        padding: 14px;
        margin: 14px;
        background-color: bisque;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="childContainer">
        <div class="child">i am a child</div>
      </section>
    </div>
    <script>
      let child = document.querySelector(".child");
      child.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("child was clicked");
      });

      let childContainer = document.querySelector(".childContainer");
      childContainer.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("child Container was clicked");
      });
      document.querySelector(".container").addEventListener("click", (e) => {
        alert("container was clicked");
      });
      document.querySelector(".container").removeEventListener("click", (e) => {
        alert("container was clicked");
      });

      function getRandomColor() {
        let val1 = Math.floor(Math.random() * 255) + 1;
        let val2 = Math.floor(Math.random() * 255) + 1;
        let val3 = Math.floor(Math.random() * 255) + 1;

        return `rgb(${val1},${val2},${val3})`;
      }

      let a = setInterval(() => {
        document.querySelector(".childContainer").style.backgroundColor =
          getRandomColor();
      }, 500);
      //   clearInterval(a);

      //   let a = setTimeout(() => {
      //     document.querySelector(".childContainer").style.backgroundColor =
      //       getRandomColor();
      //   }, 1000);
      //   clearInterval(a);

      setTimeout(() => {
        clearInterval(a);
      }, 5000);
    </script>
  </body>
</html>
