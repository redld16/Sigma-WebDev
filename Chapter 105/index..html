<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React</title>
    <style>
      .box {
        width: 121px;
        height: 121px;
        color: red;
        border: 2px solid black;
        padding: 3px;
      }
    </style>
  </head>
  <body>
    <div class="box box1">i am box1</div>
    <div class="box box2">i am box2</div>
    <div class="box box3">i am box3</div>
    <script>
      setTimeout(() => {
        document.querySelector(".box1").innerHTML = "hey";
      }, 1000);
      setTimeout(() => {
        document.querySelector(".box2").innerHTML = "hi";
      }, 2000);
      setTimeout(() => {
        document.querySelector(".box3").innerHTML = "hello";
      }, 3000);
    </script>
  </body>
</html>
