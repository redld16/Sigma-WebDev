<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS display property</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        background-color: aqua;
        border: 2px solid black;
        display: inline-block;
        width: 335px;
        padding: 45px;
        margin: 35px;
      }
      /* span {
        padding: 35px;
        border: 2px solid black;
      } */
    </style>
  </head>
  <body>
    <div class="box">i am a boxNG</div>
    <div class="box">i am also a box</div>
    <span>hi i am a span</span>
  </body>
</html>
