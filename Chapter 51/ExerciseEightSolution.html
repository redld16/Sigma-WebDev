<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Eight Solution</title>
    <style>
      .box {
        height: 100px;
        width: 100px;
        background-color: red;
        border-radius: 50px;
        position: absolute;
        bottom: 0;
        left: 0;
        animation: bounceX 3s linear infinite,
          bounceY 1s ease-out infinite alternate;
      }

      .container {
        position: relative;
        height: 80vh;
        width: 1000px;
        background-color: blue;
      }
      @keyframes bounceX {
        from {
          left: 0;
        }
        to {
          left: 80%;
        }
      }

      @keyframes bounceY {
        from {
          bottom: 0;
        }
        to {
          bottom: 80%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
    </div>
    <!-- 
   
     -->
  </body>
</html>
