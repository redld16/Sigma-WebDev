<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors in CSS</title>
    <style>
        h1{
            color: #4cf23a;
        }
        #keywords{
            color: aqua;
        }
        #hexcode{
            color: #02be00;
        }
        #RGB{
            color: rgb(220, 255, 32);
        }
        #RGBA{
            color: rgba(32, 177, 250, 0.6);
        }
        #HSL{
            color:hsl(0, 84%, 48%)
        }
    </style>
</head>
<body>
    <h1>hi i am a h1</h1>
    <P>colors type in css
        <ol>
            <li id="keywords">color keywords</li>
            <li id="hexcode">color hexcode</li>
            <li id="RGB">RGB color</li>
            <li id="RGBA">RGBA</li>
            <li id="HSL">HSL</li>
        </ol>
    </P>
</body>
</html>
