<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Flexbox</title>
    <style>
      .container {
        border: 2px solid red;
        display: flex;
        height: 80vh;
        /* justify-content: center; */
        align-items: center;
        flex-wrap: wrap;
        /* align-content: flex-start; */
        flex-flow: row wrap;
        /* row-gap: 5px;
        column-gap: 30px; */
        gap: 30px 10px;
      }
      .item {
        /* flex-grow: 1; */
        background-color: blueviolet;
        height: 42px;
        width: 42px;
        border: 2px solid black;
      }
      .item1 {
        /* flex-grow: 2; */
        /* flex-shrink: 2; */
        align-self: flex-end;
      }
      .order {
        order: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="item item1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </main>
  </body>
</html>
