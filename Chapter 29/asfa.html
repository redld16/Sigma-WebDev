<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature Card</title>
    <style>
      /* Improved version of your CSS */
      .card {
        width: 350px;
        margin: 50px auto; /* Better centering */
        border-radius: 20px;
        border: 2px solid #e0e0e0; /* Softer border color */
        overflow: hidden; /* Contain child elements */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Add subtle shadow */
        font-family: Arial, sans-serif; /* Explicit font family */
      }

      img {
        width: 100%;
        height: 250px;
        object-fit: cover; /* Better image handling */
        border-radius: 20px 20px 0 0; /* Only round top corners */
        margin: 0; /* Remove default image margin */
      }

      /* .tags-container {
        position: absolute;
        top: 20px;
        left: 15px;
      } */

      span {
        display: inline-block;
        background: rgba(255, 255, 255, 0.9); /* Semi-transparent background */
        border-radius: 20px;
        padding: 6px 12px;
        margin: 0 5px;
        color: #333; /* Darker text color */
        font-size: 0.9em;
        border: 1px solid rgba(0, 0, 0, 0.1); /* Subtle border */
      }

      h2 {
        margin: 15px;
        color: #2d3436; /* Darker heading color */
      }

      p {
        margin: 0 15px 15px;
        color: #636e72; /* Better text contrast */
        line-height: 1.5; /* Better readability */
      }

      button {
        display: block;
        width: 50%;
        margin: 0 auto 15px;
        padding: 10px 20px;
        background-color: #00b894;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #00997b; /* Hover effect */
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="image-container">
        <img src="sample 6.jpg" alt="Lago di Braies" />
        <div class="tags-container">
          <span>Nature</span>
          <span>Lake</span>
        </div>
      </div>
      <h2>Lago di Braies</h2>
      <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Omnis
        voluptatum aut consectetur esse porro aperiam dignissimos asperiores,
        corrupti officia aliquid pariatur placeat.
      </p>
      <button>Read More</button>
    </div>
  </body>
</html>
