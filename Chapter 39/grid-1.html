<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid in CSS</title>
    <style>
      .container {
        width: 80vw;
        height: 100vh;
        border: 2px solid black;
        display: grid;
        /* grid-template-columns: [first]120px [second]100px [third];
        grid-template-rows: 100px 100px 100px; */
        /* grid-template-columns: 1fr 2fr 1fr; */
        grid-template-columns: repeat(4, minmax(100px, 1fr));
        row-gap: 10px;
        column-gap: 30px;
        /* justify-items: center;
        align-items: center; */
        place-content: center;
      }
      .items {
        border: 2px solid red;
        height: 55px;
        width: 55px;
      }
      /* .item-1{
        align-self: start;
      } */
      /* .item-4 {
        grid-row: 1/2;
        grid-column: second/third;
      }
      .item-1 {
        grid-row: 1/2;
        grid-column: 1/2;
        text-align: center;
      } */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="items item-1">1</div>
      <div class="items">2</div>
      <div class="items">3</div>
      <div class="items item-4">4</div>
      <div class="items">5</div>
    </div>
  </body>
</html>
