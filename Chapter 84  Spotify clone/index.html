<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utility.css" />
  </head>
  <body>
    <div class="container flex bg-black">
      <div class="sidebar">
        <div class="close">
          <img src="img/close.svg" class="invert" width="30px" alt="" />
        </div>
        <div class="home rounded m-1 p-1 bg-gray">
          <img
            class="invert"
            width="110px"
            src="img/logo.svg"
            alt="logo"
            srcset=""
          />
          <ul>
            <li>
              <img class="invert" src="img/home.svg" alt="home" srcset="" />
              home
            </li>
            <li>
              <img class="invert" src="img/search.svg" alt="search" srcset="" />
              search
            </li>
          </ul>
        </div>

        <div class="library bg-gray rounded m-1 p-1">
          <div class="heading">
            <img class="invert" src="img/playlist.svg" alt="" />
            <h3>Your Library</h3>
          </div>

          <div class="songList">
            <ul></ul>
          </div>

          <div class="footer">
            <div>
              <a href="https://www.spotify.com/legal/"><span>Legal</span></a>
            </div>

            <div>
              <a href="https://www.spotify.com/privacy/"
                ><span>Privacy Center</span></a
              >
            </div>

            <div>
              <a href="https://www.spotify.com/legal/privacy-policy/"
                ><span>Privacy Policy</span></a
              >
            </div>

            <div>
              <a href="https://www.spotify.com/legal/cookies-policy/"
                ><span>Cookies</span></a
              >
            </div>

            <div>
              <a href="https://www.spotify.com/legal/privacy-policy/#s3"
                ><span>About Ads</span></a
              >
            </div>

            <div>
              <a href="https://www.spotify.com/accessibility/"
                ><span>Accessibility</span></a
              >
            </div>
          </div>
        </div>
      </div>

      <div class="right rounded bg-gray">
        <div class="header">
          <div class="nav">
            <div class="hamburgerContainer">
              <img
                class="invert hamburger"
                width="40px"
                src="img/hamburger.svg"
                alt=""
              />
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
                color="#ffffff"
                fill="none"
              >
                <path
                  d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18"
                  stroke="#ffffff"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
                color="#ffffff"
                fill="none"
              >
                <path
                  d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18"
                  stroke="#ffffff"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </div>
          </div>

          <div class="btns">
            <button class="signupBtn">Sign Up</button>
            <button class="loginBtn">Log in</button>
          </div>
        </div>

        <div class="spotifyPlaylist">
          <h3>Spotify-Playlists</h3>

          <div class="cardContainer"></div>
          <div class="playbar">
            <div class="seekbar">
              <div class="circle"></div>
            </div>
            <div class="aboveBar">
              <div class="songInfo"></div>

              <div class="songButtons">
                <img width="30px" id="previous" src="img/prevsong.svg" alt="" />
                <img width="30px" id="play" src="img/play.svg" alt="" />
                <img width="30px" id="next" src="img/nextsong.svg" alt="" />
              </div>

              <div class="voluTime">
                <div class="songTime"></div>
                <div class="volume">
                  <img src="img/volume.svg" width="25px" alt="" />
                  <div class="range">
                    <input type="range" name="volume" id="" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
