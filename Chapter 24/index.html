<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shadows and Outline in CSS</title>
    <style>
      .box {
        border: 2px solid black;
        padding: 34px;
        width: 300px;
        box-shadow: 5px 5px 10px 5px #000;
      }
      p {
        text-shadow: 2px 2px 5px #3cdde2;
      }
    </style>
  </head>
  <body>
    <div class="box">i am a box</div>
    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Excepturi
      aperiam sequi eveniet. Debitis perferendis earum blanditiis quidem neque
      laborum nemo excepturi, suscipit minima libero quos enim quas quam culpa?
      Quidem?
    </p>
  </body>
</html>
