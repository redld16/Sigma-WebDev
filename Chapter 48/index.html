<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        height: 100px;
        width: 100px;
        background-color: red;
        border-radius: 50px;
        position: absolute;
        bottom: 0;
        left: 0;
        animation: bounce 10s ease 1s infinite normal forwards;
      }

      .container {
        position: relative;
        height: 80vh;
        width: 1000px;
        background-color: blue;
      }
      @keyframes bounce {
        0% {
        }
        15% {
          transform: translateX(150px) translateY(-250px);
        }
        30% {
          transform: translateX(300px) translateY(0px);
        }
        45% {
          transform: translateX(450px) translateY(-200px);
        }
        60% {
          transform: translateX(600px) translateY(0px);
        }
        80% {
          transform: translateX(750px) translateY(-150px);
        }
        100% {
          transform: translateX(900px) translateY(0px);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box"></div>
    </div>
    <!-- 
   
     -->
  </body>
</html>
