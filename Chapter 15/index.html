<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Type of uses of CSS</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      #internal {
        color: aliceblue;
        background-color: darkblue;
      }
    </style>
  </head>
  <body>
    <h1>Three ways to use css</h1>
    <ul>
      <li style="color: red; background-color: yellow">inline css</li>
      <li id="internal">internal css</li>
      <li id="external">external css</li>
    </ul>
  </body>
</html>
