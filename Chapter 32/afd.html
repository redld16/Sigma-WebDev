<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      .card {
        box-sizing: border-box;
        margin: 20px auto;
        border: 2px solid darkgray;
        border-radius: 16px;
        box-shadow: 5px 5px 10px #626262;
        width: 25vw;
        height: 60vh;
        background-color: white;
        overflow: hidden;
      }
      img {
        width: 100%;
        height: 45%;
        border-radius: 16px 16px 0 0;
      }
      span {
        display: inline-block;
        border: 1px solid darkgray;
        color: rgb(91, 83, 83);
        border-radius: 24px;
        padding: 2px 12px;
        margin: 10px 10px;
        box-shadow: 2px 2px 8px #626262;
      }
      h2 {
        color: black;
        margin-left: 10px;
      }
      p {
        text-indent: 15px;
        color: black;
        margin: 10px;
      }
      button {
        border-radius: 24px;
        background-color: rgb(183, 219, 255);
        color: rgb(0, 0, 255);
        font-size: 16px;
        padding: 6px 20px;
        margin-left: 33%;
        box-shadow: 5px 5px 10px #626262;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        src="https://img.freepik.com/free-photo/woman-beach-with-her-baby-enjoying-sunset_52683-144131.jpg?size=626&ext=jpg"
        alt=""
      />
      <span>Nature</span>
      <span>Lake</span>
      <h2>klasdffkls dsljkafs</h2>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Magnam dolorem,
        officia expedita tempora debitis iusto veniam aliquid saepe earum
        quisquam nesciunt fuga harum magni deleniti eveniet error voluptates
        ullam laborum?
      </p>
      <button>Read More</button>
    </div>
  </body>
</html>
