<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excercise three Solution</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins&display=swap");

      * {
        padding: 0;
        margin: 0;
        font-family: "Poppins", sans-serif;
      }
      body {
        background-color: gray;
      }
      .card {
        margin: 20px auto;
        background-color: white;
        /* height: 550px; */
        width: 360px;
        padding: 0 0 20px 0;
        border-radius: 20px;
        box-shadow: 5px 5px 10px rgb(42, 41, 41);
      }
      .image {
        height: 275px;
        width: 350px;
        padding: 5px;
        border-radius: 20px 20px 0 0;
      }
      span {
        border: 1px solid gray;
        border-radius: 20px;
        padding: 0 10px;
        margin-left: 15px;
        font-weight: 500;
        font-size: 15px;
        box-shadow: 5px 5px 10px rgb(42, 41, 41);
      }
      h2 {
        margin: 15px;
      }
      p {
        margin: 15px;
        color: gray;
      }
      .button {
        text-align: center;
      }
      .button button {
        color: blue;
        background-color: lightblue;
        padding: 10px 20px;
        border-radius: 20px;
        border: none;
        font-weight: 900;
        cursor: pointer;
      }
      .button button:hover {
        background-color: blue;
        color: white;
        box-shadow: 5px 5px 10px rgb(42, 41, 41);

      }
    </style>
  </head>
  <body>
    <div class="card">
      <img
        class="image"
        src="https://img.freepik.com/free-photo/woman-beach-with-her-baby-enjoying-sunset_52683-144131.jpg?size=626&ext=jpg"
        alt="random image"
      />
      <div class="capsule"><span>nature</span> <span>lake</span></div>
      <div class="content">
        <h2>Lago di braies</h2>
        <p>
          Lorem ipsum dolor, sit amet consectetur adipisicing elit. Omnis
          voluptatum aut consectetur esse porro aperiam dignissimos asperiores,
          corrupti officia aliquid pariatur placeat. Dolores adipisci voluptatem
          quisquam voluptates officiis? Enim, sequi!
        </p>
      </div>
      <div class="button"><button>Read more</button></div>
    </div>
  </body>
</html>
