<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Filters</title>
    <style>
      .img-1 {
        /* filter: blur(3px); */
        filter: brightness(120%);
      }

      .img-2{
        filter: brightness(40%);
      }
      .img-3{
        filter: invert(1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        class="img-1"
        src="https://media.istockphoto.com/id/814423752/photo/eye-of-model-with-colorful-art-make-up-close-up.jpg?s=612x612&w=0&k=20&c=l15OdMWjgCKycMMShP8UK94ELVlEGvt7GmB_esHWPYE="
        alt=""
      />
      <img
        class="img-2"
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQBvqzyx_zoi6q2c0Gd1XnE7wysD9PGOLe3-A&s"
        alt=""
      />
      <img
        class="img-3"
        src="https://img.freepik.com/free-photo/closeup-young-hispanic-man-casuals-studio_662251-600.jpg?semt=ais_hybrid&w=740"
        alt=""
      />
    </div>
  </body>
</html>
