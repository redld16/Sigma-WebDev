<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio and Video</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <video
      controls
      src="Wildlife Windows 7 Sample Video.mp4"
      height="250"
      muted
      poster="photo-1619983081563-430f63602796.avif"
    ></video>
    <audio
      controls
      src="Sample Breakdown- Daft Punk - One More Time.mp3"
    ></audio>
    <svg height="100" width="100">
      <circle
        cx="50"
        cy="50"
        r="40"
        stroke="black"
        stroke-width="3"
        fill="red"
      />
    </svg>
    <!-- <iframe
      src="https://www.codewithharry.com/tutorial/html-iframes"
      width="350"
      height="250"
    ></iframe> -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/tVzUXW6siu0?si=DHbGMTscMjhTmXde&amp;start=600"
      title="YouTube video player"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>
  </body>
</html>
